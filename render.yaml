services:
  - type: web
    name: statescope-aacl-demo
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -e ".[closed]"
    startCommand: python -m apps.statescope.server --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: STATESCOPE_ALLOWED_ORIGINS
        value: https://statescope.github.io
