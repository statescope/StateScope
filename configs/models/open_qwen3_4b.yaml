# DriftMath model config -- edit freely (HF ids, context length, GPU plan).
type: openai_compat
params:
  model: Qwen/Qwen3-4B
  base_url: http://localhost:8000/v1
  api_key_env: VLLM_API_KEY
  api_key_fallback: EMPTY
  timeout: 120
  max_tokens: 2048
  temperature: 0.0
  supports_tools: false
  extra_body:
    chat_template_kwargs:
      enable_thinking: false
vllm:
  model_id: Qwen/Qwen3-4B
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.5
  max_model_len: 32768
  dtype: bfloat16
  trust_remote_code: true
catalog:
  size_b: 4
  category: reasoning
  recommended_gpu: A100-40GB x1
  supports_tools: false
