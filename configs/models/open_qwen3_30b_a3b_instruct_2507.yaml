# DriftMath model config -- edit freely (HF ids, context length, GPU plan).
# Qwen3-30B-A3B-Instruct-2507 is a MoE model (30B total, ~3B active): bf16 weights
# are ~61GB, so it serves on a single MI300X (192GB) without quantization.
type: openai_compat
params:
  model: Qwen/Qwen3-30B-A3B-Instruct-2507
  base_url: http://localhost:8000/v1
  api_key_env: VLLM_API_KEY
  api_key_fallback: EMPTY
  timeout: 180
  max_tokens: 4096
  temperature: 0.0
  supports_tools: false
  extra_body:
    chat_template_kwargs:
      enable_thinking: false
vllm:
  model_id: Qwen/Qwen3-30B-A3B-Instruct-2507
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.5
  max_model_len: 32768
  dtype: bfloat16
  trust_remote_code: true
catalog:
  size_b: 30
  category: general
  recommended_gpu: MI300X-192GB x1
  supports_tools: false
